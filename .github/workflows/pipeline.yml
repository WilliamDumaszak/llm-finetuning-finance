name: LLM Fine-tuning Finance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/llm-finetuning-finance

jobs:

  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  build-and-push:
    name: Build & Push
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      AZURE_ACR_REGISTRY: ${{ secrets.AZURE_ACR_REGISTRY }}
    steps:
      - uses: actions/checkout@v4

      # ── Docker Hub ────────────────────────────────────────────────────────
      - name: Log in to Docker Hub
        if: env.DOCKER_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push to Docker Hub
        if: env.DOCKER_USERNAME != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      # ── Azure Container Registry ──────────────────────────────────────────
      - name: Log in to Azure Container Registry
        if: env.AZURE_ACR_REGISTRY != ''
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.AZURE_ACR_REGISTRY }}
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Build and push to ACR
        if: env.AZURE_ACR_REGISTRY != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.AZURE_ACR_REGISTRY }}/llm-finetuning-finance:latest
            ${{ secrets.AZURE_ACR_REGISTRY }}/llm-finetuning-finance:${{ github.sha }}
