name: Azure Infra + Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag da imagem no ACR"
        required: false
        default: ""
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  TF_DIR: infra/terraform
  IMAGE_NAME: llm-finetuning-finance
  HAS_AZURE_CREDS: ${{ secrets.AZURE_CREDENTIALS != '' }}

jobs:
  terraform-and-deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (AZURE_CREDENTIALS)
        if: env.HAS_AZURE_CREDS == 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Azure Login (OIDC)
        if: env.HAS_AZURE_CREDS != 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -upgrade

      - name: Terraform Apply (infra)
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve

      - name: Read Terraform outputs
        id: tfout
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "acr_name=$(terraform output -raw acr_name)" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$(terraform output -raw acr_login_server)" >> "$GITHUB_OUTPUT"

      - name: Resolve image tag
        id: image_tag
        shell: bash
        run: |
          TAG="${{ github.sha }}"
          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            TAG="${{ github.event.inputs.image_tag }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry "${{ steps.tfout.outputs.acr_name }}" \
            --image "${{ env.IMAGE_NAME }}:${{ steps.image_tag.outputs.tag }}" \
            .

      - name: Terraform Apply (update app image)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -auto-approve \
            -var="image_reference=${{ steps.tfout.outputs.acr_login_server }}/${{ env.IMAGE_NAME }}:${{ steps.image_tag.outputs.tag }}"

      - name: Show endpoint
        working-directory: ${{ env.TF_DIR }}
        run: |
          APP_URL=$(terraform output -raw container_app_url)
          echo "Container App URL: $APP_URL"
          echo "Health URL: $APP_URL/health"
